<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>90 day butt blast ✦</title>
<meta name="description" content="90 day butt blast — a 3-day workout tracker." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-hot: #ff3d8a;
    --pink-deep: #d9006c;
    --pink-soft: #ffd1dc;
    --pink-blush: #ffe8ec;
    --rose-gold: #b76e79;
    --rose-gold-light: #e8b4b8;
    --cream: #fff8f5;
    --gold: #f6c945;
    --ink: #4a2c39;
    --ink-soft: #876672;
    --shadow-pink: 0 10px 30px -10px rgba(255, 61, 138, 0.35);
    --shadow-soft: 0 4px 20px -8px rgba(183, 110, 121, 0.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #ffd1dc 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, #ffe8ec 0%, transparent 60%),
      linear-gradient(180deg, #fff5f7 0%, #fff0f4 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255, 61, 138, 0.10) 1.2px, transparent 2px),
      radial-gradient(circle at 78% 32%, rgba(246, 201, 69, 0.12) 1.2px, transparent 2px),
      radial-gradient(circle at 32% 72%, rgba(183, 110, 121, 0.10) 1.2px, transparent 2px),
      radial-gradient(circle at 70% 84%, rgba(255, 61, 138, 0.10) 1.2px, transparent 2px);
    background-size: 220px 220px, 310px 310px, 260px 260px, 290px 290px;
    z-index: 0;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 36px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  .app-header h1 {
    font-family: 'Italiana', serif;
    font-size: clamp(2.8rem, 8vw, 4.8rem);
    letter-spacing: 0.02em;
    margin: 0;
    background: linear-gradient(135deg, #ff3d8a 0%, #ff69b4 40%, #b76e79 80%, #f6c945 110%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    line-height: 1.05;
  }
  .app-header .subtitle {
    font-family: 'Dancing Script', cursive;
    color: var(--rose-gold);
    font-size: 1.3rem;
    margin-top: 4px;
  }
  .sparkle {
    display: inline-block;
    animation: twinkle 2.6s ease-in-out infinite;
    color: #ff69b4;
  }
  .sparkle.s2 { animation-delay: 0.9s; }
  .sparkle.s3 { animation-delay: 1.6s; color: var(--gold); }
  @keyframes twinkle {
    0%, 100% { opacity: 0.55; transform: scale(0.85) rotate(-8deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(8deg); }
  }

  /* Tabs */
  nav.tabs {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  nav.tabs button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    padding: 10px 22px;
    border: 1.5px solid transparent;
    background: rgba(255, 255, 255, 0.65);
    color: var(--rose-gold);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
  }
  nav.tabs button:hover {
    background: rgba(255, 255, 255, 0.95);
    border-color: var(--rose-gold-light);
  }
  nav.tabs button.active {
    background: linear-gradient(135deg, #ff3d8a, #ff69b4);
    color: white;
    box-shadow: var(--shadow-pink);
    border-color: transparent;
  }

  /* Day picker */
  .day-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .day-picker button {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.92rem;
    padding: 14px 10px;
    background: white;
    border: 1.5px solid var(--pink-soft);
    border-radius: 18px;
    cursor: pointer;
    color: var(--rose-gold);
    transition: all 0.25s ease;
    box-shadow: var(--shadow-soft);
    text-align: center;
  }
  .day-picker button .day-num {
    display: block;
    font-family: 'Italiana', serif;
    font-style: normal;
    font-size: 1.5rem;
    background: linear-gradient(135deg, #ff3d8a, #b76e79);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    margin-bottom: 2px;
  }
  .day-picker button.active {
    border-color: var(--pink-hot);
    background: linear-gradient(180deg, #fff 60%, #ffe8ec 100%);
    transform: translateY(-2px);
    box-shadow: 0 12px 28px -10px rgba(255, 61, 138, 0.4);
  }
  .day-picker button:hover { transform: translateY(-1px); }

  /* Day header */
  .day-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .day-header h2 {
    font-family: 'Italiana', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    margin: 0;
    background: linear-gradient(135deg, #ff3d8a, #b76e79);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* Exercise card */
  .exercise {
    background: white;
    border-radius: 22px;
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255, 209, 220, 0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .exercise:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 32px -12px rgba(255, 61, 138, 0.28);
  }
  .exercise .row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 0;
  }
  @media (max-width: 560px) {
    .exercise .row { grid-template-columns: 1fr; }
    .exercise .photo { min-height: 180px; max-height: 220px; }
  }
  .exercise .photo {
    background: linear-gradient(135deg, #ffd1dc, #ffe8ec);
    position: relative;
    overflow: hidden;
    min-height: 160px;
  }
  .exercise .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .exercise .photo.broken { display: flex; align-items: center; justify-content: center; }
  .exercise .photo.broken::after {
    content: '✦';
    font-family: 'Italiana', serif;
    font-size: 3rem;
    color: var(--rose-gold-light);
  }
  .exercise .body {
    padding: 18px 22px;
  }
  .exercise h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin: 0 0 2px;
    color: var(--ink);
  }
  .exercise .sets-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .exercise .sets-label {
    font-family: 'Dancing Script', cursive;
    font-size: 1.2rem;
    color: var(--rose-gold);
  }
  .tips-toggle {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 13px;
    background: rgba(255, 209, 220, 0.45);
    color: var(--rose-gold);
    border: 1px solid var(--pink-soft);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tips-toggle:hover {
    background: var(--pink-blush);
    border-color: var(--pink-hot);
    color: var(--pink-deep);
  }
  .tips-toggle.active {
    background: linear-gradient(135deg, #ff3d8a, #ff69b4);
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 12px -4px rgba(255, 61, 138, 0.4);
  }
  .tips-panel {
    background: linear-gradient(135deg, #fff5f7, #ffe8ec);
    border-radius: 14px;
    padding: 12px 16px 14px;
    margin-bottom: 14px;
    border: 1px dashed var(--rose-gold-light);
    animation: tipsFadeIn 0.25s ease;
  }
  .tips-panel[hidden] { display: none; }
  @keyframes tipsFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tips-panel h4 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--pink-deep);
    margin: 0 0 8px;
    letter-spacing: 0.01em;
  }
  .tips-panel ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .tips-panel li {
    font-size: 0.88rem;
    color: var(--ink);
    padding: 3px 0 3px 18px;
    position: relative;
    line-height: 1.45;
  }
  .tips-panel li::before {
    content: '✦';
    position: absolute;
    left: 0;
    top: 3px;
    color: var(--pink-hot);
    font-size: 0.8rem;
  }

  /* Set checkboxes */
  .sets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sets label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff5f7;
    padding: 6px 12px 6px 8px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--ink-soft);
    font-weight: 600;
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .sets input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--rose-gold-light);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    margin: 0;
    transition: all 0.2s;
    background: white;
  }
  .sets input[type="checkbox"]:checked {
    background: linear-gradient(135deg, #ff3d8a, #ff69b4);
    border-color: transparent;
  }
  .sets input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .sets label:has(input:checked) {
    background: #ffe8ec;
    color: var(--pink-deep);
    border-color: var(--pink-soft);
  }

  /* Inputs */
  .inputs {
    display: grid;
    grid-template-columns: minmax(110px, 1fr) 2fr;
    gap: 10px;
  }
  @media (max-width: 460px) {
    .inputs { grid-template-columns: 1fr; }
  }
  .inputs .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--rose-gold);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .inputs input, .inputs textarea {
    width: 100%;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 9px 12px;
    border-radius: 12px;
    border: 1.5px solid var(--pink-blush);
    background: #fffcfd;
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .inputs input:focus, .inputs textarea:focus {
    outline: none;
    border-color: var(--pink-hot);
    box-shadow: 0 0 0 4px rgba(255, 61, 138, 0.12);
  }
  .inputs textarea { min-height: 40px; font-family: inherit; }

  /* Save */
  .save-row {
    text-align: center;
    margin-top: 32px;
  }
  .save-row button.save {
    font-family: 'Italiana', serif;
    font-size: 1.25rem;
    letter-spacing: 0.06em;
    padding: 16px 44px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff3d8a, #ff69b4 50%, #b76e79);
    background-size: 200% 200%;
    background-position: 0% 50%;
    color: white;
    cursor: pointer;
    box-shadow: var(--shadow-pink);
    transition: all 0.35s ease;
    position: relative;
  }
  .save-row button.save:hover {
    transform: translateY(-2px) scale(1.02);
    background-position: 100% 50%;
    box-shadow: 0 16px 40px -8px rgba(255, 61, 138, 0.5);
  }
  .save-row button.save:active { transform: scale(0.98); }
  .save-row .hint {
    display: block;
    font-family: 'Dancing Script', cursive;
    color: var(--rose-gold);
    margin-top: 14px;
    font-size: 1.1rem;
  }

  /* History */
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .history-empty .big {
    font-family: 'Italiana', serif;
    font-size: 2rem;
    color: var(--rose-gold);
    margin-bottom: 8px;
  }
  .session-card {
    background: white;
    border-radius: 22px;
    padding: 22px 26px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255, 209, 220, 0.6);
  }
  .session-card .top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .session-card .date {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--rose-gold);
    font-size: 0.95rem;
  }
  .session-card .day-name {
    font-family: 'Italiana', serif;
    font-size: 1.4rem;
    background: linear-gradient(135deg, #ff3d8a, #b76e79);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .ex-line {
    padding: 10px 0;
    border-top: 1px dashed var(--pink-blush);
    font-size: 0.95rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .ex-line:first-of-type { border-top: none; }
  .ex-line .name { font-weight: 700; color: var(--ink); }
  .ex-line .meta { color: var(--ink-soft); font-size: 0.82rem; }
  .ex-line .stats { color: var(--pink-deep); font-weight: 700; font-size: 1rem; text-align: right; }
  .ex-line .notes {
    display: block;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 0.85rem;
    margin-top: 2px;
  }
  .ex-line .check-dots {
    display: inline-flex;
    gap: 3px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .ex-line .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--pink-blush);
  }
  .ex-line .dot.on { background: linear-gradient(135deg, #ff3d8a, #ff69b4); }
  .session-card .delete {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 0.82rem;
    text-decoration: underline;
    margin-top: 12px;
    padding: 0;
    font-family: inherit;
  }
  .session-card .delete:hover { color: var(--pink-deep); }

  /* Programme tab */
  .prog-day {
    background: white;
    border-radius: 22px;
    padding: 22px 26px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255, 209, 220, 0.6);
  }
  .prog-day h3 {
    font-family: 'Italiana', serif;
    font-size: 1.6rem;
    margin: 0 0 4px;
    background: linear-gradient(135deg, #ff3d8a, #b76e79);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .prog-day .pill {
    font-family: 'Dancing Script', cursive;
    color: var(--rose-gold);
    font-size: 1.15rem;
    margin-bottom: 12px;
  }
  .prog-day ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .prog-day li {
    padding: 8px 0;
    border-bottom: 1px dashed var(--pink-blush);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
  }
  .prog-day li:last-child { border-bottom: none; }
  .prog-day li .ex-name { font-weight: 600; color: var(--ink); }
  .prog-day li .ex-sets { color: var(--pink-deep); font-weight: 700; font-family: 'Quicksand'; font-size: 0.92rem; }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: linear-gradient(135deg, #ff3d8a, #ff69b4);
    color: white;
    padding: 14px 26px;
    border-radius: 999px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    box-shadow: 0 12px 30px -8px rgba(255, 61, 138, 0.5);
    z-index: 100;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
    opacity: 0;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Views */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  footer.signoff {
    text-align: center;
    margin-top: 50px;
    color: var(--rose-gold);
    font-family: 'Dancing Script', cursive;
    font-size: 1.1rem;
  }

  /* Confetti / sparkle burst on save */
  .sparkle-burst {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    font-size: 1.4rem;
    animation: burst 1.2s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(0,0) scale(0.4) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(var(--rot)); }
  }
</style>
</head>
<body>
<div class="container">

  <header class="app-header">
    <h1><span class="sparkle">✦</span> 90 day butt blast <span class="sparkle s2">✦</span></h1>
    <p class="subtitle" id="todayDate"></p>
  </header>

  <nav class="tabs" role="tablist">
    <button data-view="today" class="active" type="button">today's set</button>
    <button data-view="history" type="button">history</button>
    <button data-view="programme" type="button">the programme</button>
  </nav>

  <section class="view active" id="view-today">
    <div class="day-picker" id="dayPicker"></div>
    <div class="day-header">
      <h2 id="dayName"></h2>
    </div>
    <div id="exerciseList"></div>
    <div class="save-row">
      <button class="save" id="saveBtn" type="button">save today's session ✦</button>
      <span class="hint">make it count, babe</span>
    </div>
  </section>

  <section class="view" id="view-history">
    <div id="historyList"></div>
  </section>

  <section class="view" id="view-programme">
    <div id="programmeList"></div>
  </section>

  <footer class="signoff">made with love, glitter, and protein ✦</footer>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";

const PROGRAMME = [

    key: 'day1',

        tips: [

      {

        img: 'https://media.giphy.com/media/vUBCZJdPyaw8r1bEKW/giphy.gif',
        tips: [

      {

      },

  },
  {

    title: 'Sexy Legs',
    tag: 'legs',
    crown: '🦋',
    exercises: [

const STORAGE_KEY = 'herGymEra.v1';

const state = {
  selectedDayKey: 'day1',
  draft: null,
  history: [],
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.history = Array.isArray(data.history) ? data.history : [];
    state.draft = data.draft || null;
    state.selectedDayKey = data.selectedDayKey || 'day1';
  } catch (e) {
    console.warn('failed to load state', e);
  }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      history: state.history,
      draft: state.draft,
      selectedDayKey: state.selectedDayKey,
    }));
  } catch (e) {
    console.warn('failed to persist', e);
  }
}

function getDay(key) {
  return PROGRAMME.find(d => d.key === key) || PROGRAMME[0];
}

function blankSessionFor(dayKey) {
  const day = getDay(dayKey);
  return {
    dayKey: day.key,
    dayName: day.title,
    exercises: day.exercises.map(ex => ({
      name: ex.name,
      sets: new Array(ex.sets).fill(false),
      weight: '',
      notes: '',
    })),
  };
}

function ensureDraft() {
  if (!state.draft || state.draft.dayKey !== state.selectedDayKey) {
    state.draft = blankSessionFor(state.selectedDayKey);
  }
}

function $(sel) { return document.querySelector(sel); }
function el(tag, opts, ...children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.class) e.className = opts.class;
    if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) e.setAttribute(k, v);
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.on) for (const [k, v] of Object.entries(opts.on)) e.addEventListener(k, v);
  }
  for (const c of children) if (c) e.appendChild(c);
  return e;
}

function fmtDate(d) {
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function renderDayPicker() {
  const wrap = $('#dayPicker');
  wrap.innerHTML = '';
  PROGRAMME.forEach((day, i) => {
    const btn = el('button', {
      class: day.key === state.selectedDayKey ? 'active' : '',
      attrs: { type: 'button', 'aria-pressed': day.key === state.selectedDayKey ? 'true' : 'false' },
      on: { click: () => {
        state.selectedDayKey = day.key;
        ensureDraft();
        persist();
        renderToday();
      } },
      html: `<span class="day-num">Day ${i+1}</span><span>${day.title}</span>`,
    });
    wrap.appendChild(btn);
  });
}

function renderExercises() {
  const list = $('#exerciseList');
  list.innerHTML = '';
  const day = getDay(state.selectedDayKey);

  day.exercises.forEach((ex, idx) => {
    const draftEx = state.draft.exercises[idx];

    const photo = el('div', { class: 'photo' });
    const img = el('img', {
      attrs: {
        src: ex.img,
        alt: ex.name + ' reference',
        loading: 'lazy',
        referrerpolicy: 'no-referrer',
      }
    });
    img.addEventListener('error', () => { photo.classList.add('broken'); img.remove(); });
    photo.appendChild(img);

    const setsWrap = el('div', { class: 'sets' });
    for (let s = 0; s < ex.sets; s++) {
      const cb = el('input', { attrs: { type: 'checkbox' } });
      if (draftEx.sets[s]) cb.checked = true;
      cb.addEventListener('change', () => {
        draftEx.sets[s] = cb.checked;
        persist();
      });
      const lab = el('label', {}, cb);
      lab.appendChild(document.createTextNode(' set ' + (s + 1)));
      setsWrap.appendChild(lab);
    }

    const weightInput = el('input', {
      attrs: { type: 'text', placeholder: 'e.g. 60kg', inputmode: 'decimal', autocomplete: 'off' }
    });
    weightInput.value = draftEx.weight || '';
    weightInput.addEventListener('input', () => { draftEx.weight = weightInput.value; persist(); });

    const notesInput = el('textarea', {
      attrs: { placeholder: 'how did it feel?', rows: '1' }
    });
    notesInput.value = draftEx.notes || '';
    notesInput.addEventListener('input', () => { draftEx.notes = notesInput.value; persist(); });

    const tipsPanel = el('div', { class: 'tips-panel' });
    tipsPanel.hidden = true;
    tipsPanel.appendChild(el('h4', { text: 'how to do it right' }));
    const tipsUl = el('ul');
    (ex.tips || []).forEach(t => tipsUl.appendChild(el('li', { text: t })));
    tipsPanel.appendChild(tipsUl);

    const tipsToggle = el('button', {
      class: 'tips-toggle',
      attrs: { type: 'button', 'aria-expanded': 'false' },
      text: 'form tips ✦',
      on: { click: () => {
        const open = tipsPanel.hidden;
        tipsPanel.hidden = !open;
        tipsToggle.classList.toggle('active', open);
        tipsToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      } },
    });

    const body = el('div', { class: 'body' },
      el('h3', { text: ex.name }),
      el('div', { class: 'sets-label-row' },
        el('span', { class: 'sets-label', text: ex.sets + ' × ' + ex.reps }),
        tipsToggle
      ),
      tipsPanel,
      setsWrap,
      el('div', { class: 'inputs' },
        el('div', { class: 'field' },
          el('label', { text: 'Weight' }),
          weightInput
        ),
        el('div', { class: 'field' },
          el('label', { text: 'Notes' }),
          notesInput
        )
      )
    );

    const card = el('div', { class: 'exercise' },
      el('div', { class: 'row' }, photo, body)
    );
    list.appendChild(card);
  });
}

function renderToday() {
  ensureDraft();
  $('#todayDate').textContent = fmtDate(new Date());
  const day = getDay(state.selectedDayKey);
  $('#dayName').innerHTML = `${day.crown} ${day.title} ${day.crown}`;
  renderDayPicker();
  renderExercises();
}

function renderHistory() {
  const wrap = $('#historyList');
  wrap.innerHTML = '';
  if (!state.history.length) {
    wrap.appendChild(el('div', { class: 'history-empty' },
      el('div', { class: 'big', text: 'no sessions yet, queen' }),
      el('div', { text: "save your first workout and it'll show up here ✦" })
    ));
    return;
  }
  const sorted = [...state.history].sort((a, b) => b.completedAt - a.completedAt);
  sorted.forEach(sess => {
    const date = new Date(sess.completedAt);
    const dateStr = date.toLocaleDateString(undefined, {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
    });

    const card = el('div', { class: 'session-card' });
    card.appendChild(el('div', { class: 'top' },
      el('span', { class: 'day-name', text: sess.dayName }),
      el('span', { class: 'date', text: dateStr })
    ));

    sess.exercises.forEach(ex => {
      const done = ex.sets.filter(Boolean).length;
      const total = ex.sets.length;

      const dots = el('span', { class: 'check-dots', attrs: { 'aria-label': `${done} of ${total} sets completed` } });
      for (let i = 0; i < total; i++) {
        dots.appendChild(el('span', { class: 'dot' + (ex.sets[i] ? ' on' : '') }));
      }

      const left = el('div', {});
      const nameRow = el('div', {},
        el('span', { class: 'name', text: ex.name })
      );
      nameRow.appendChild(dots);
      left.appendChild(nameRow);
      if (ex.notes) {
        left.appendChild(el('span', { class: 'notes', text: '"' + ex.notes + '"' }));
      }

      const right = el('div', {},
        el('div', { class: 'stats', text: ex.weight || '—' }),
        el('div', { class: 'meta', text: `${done}/${total} sets` })
      );

      card.appendChild(el('div', { class: 'ex-line' }, left, right));
    });

    card.appendChild(el('button', {
      class: 'delete',
      attrs: { type: 'button' },
      text: 'delete session',
      on: { click: () => {
        if (!confirm('Delete this session from history?')) return;
        state.history = state.history.filter(s => s.completedAt !== sess.completedAt);
        persist();
        renderHistory();
      } },
    }));

    wrap.appendChild(card);
  });
}

function renderProgramme() {
  const wrap = $('#programmeList');
  wrap.innerHTML = '';
  PROGRAMME.forEach((day, i) => {
    const card = el('div', { class: 'prog-day' });
    card.appendChild(el('h3', { text: `${day.crown} Day ${i+1}: ${day.title}` }));
    card.appendChild(el('div', { class: 'pill', text: day.tag }));
    const ul = el('ul');
    day.exercises.forEach(ex => {
      ul.appendChild(el('li', {},
        el('span', { class: 'ex-name', text: ex.name }),
        el('span', { class: 'ex-sets', text: `${ex.sets} × ${ex.reps}` })
      ));
    });
    card.appendChild(ul);
    wrap.appendChild(card);
  });
}

let toastTimer;
function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

function sparkleBurst() {
  const sparkles = ['✦', '✧', '✨', '♡', '★'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 16; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle-burst';
    s.textContent = sparkles[i % sparkles.length];
    s.style.left = (cx + (Math.random() - 0.5) * 40) + 'px';
    s.style.top = (cy + (Math.random() - 0.5) * 40) + 'px';
    const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.3;
    const dist = 140 + Math.random() * 180;
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    s.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    s.style.color = ['#ff3d8a', '#ff69b4', '#b76e79', '#f6c945', '#ffd1dc'][i % 5];
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const view = document.getElementById('view-' + name);
  const btn = document.querySelector(`nav.tabs button[data-view="${name}"]`);
  if (view) view.classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'today') renderToday();
  else if (name === 'history') renderHistory();
  else if (name === 'programme') renderProgramme();
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

$('#saveBtn').addEventListener('click', () => {
  const ses = state.draft;
  if (!ses) return;
  const touched = ses.exercises.some(ex =>
    ex.sets.some(Boolean) || ex.weight.trim() || ex.notes.trim()
  );
  if (!touched) {
    showToast('check off something first, hun ✦');
    return;
  }
  const completed = JSON.parse(JSON.stringify(ses));
  completed.completedAt = Date.now();
  state.history.push(completed);
  state.draft = blankSessionFor(state.selectedDayKey);
  persist();
  renderToday();
  sparkleBurst();
  showToast('saved! you crushed it ✦');
});

// init
load();
ensureDraft();
renderToday();
renderProgramme();
</script>
